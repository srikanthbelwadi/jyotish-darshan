sadeSatiDesc:{rising:'ಶನಿ ಜನ್ಮ ಚಂದ್ರದಿಂದ ದ್ವಾದಶ ಭಾವದಲ್ಲಿ — ಸಾಡೇಸಾತಿ ಆರಂಭ. ಸರಳತೆ ಮತ್ತು ಆಂತರಿಕ ದೃಢತೆ ಬೆಳೆಸಿ.',peak:'ಶನಿ ನೇರವಾಗಿ ಜನ್ಮ ಚಂದ್ರದ ಮೇಲೆ — ತೀವ್ರ ಹಂತ. ಧೈರ್ಯ ಮತ್ತು ಧಾರ್ಮಿಕ ಕ್ರಿಯೆ ಉಪಾಯ.',setting:'ಶನಿ ದ್ವಿತೀಯ ಭಾವದಲ್ಲಿ — ಸಾಡೇಸಾತಿ ಕೊನೆ ಹಂತ. ಸ್ಥಿರತೆ ಮರಳುತ್ತಿದೆ.',none:''},
kantakaDesc:'ಶನಿ ಕಂಟಕ ಶನಿ ಸ್ಥಾನದಲ್ಲಿ. ಆರೋಗ್ಯ, ವೃತ್ತಿ ಮತ್ತು ಸಂಬಂಧಗಳಲ್ಲಿ ಎಚ್ಚರಿಕೆ ಇರಲಿ.',
jupDesc:{good:(h,gn)=>`ಗುರು ಜನ್ಮ ಲಗ್ನದಿಂದ ${h}ನೇ ಭಾವದಲ್ಲಿ ${gn}ದಲ್ಲಿ — ಅತ್ಯಂತ ಶುಭ. ವಿಸ್ತರಣೆ ಮತ್ತು ಜ್ಞಾನ ಸಕ್ರಿಯ.`,challenging:(h,gn)=>`ಗುರು ${h}ನೇ ಭಾವದಲ್ಲಿ — ಅಧ್ಯಯನ ಮತ್ತು ಪರಿಷ್ಕಾರ ಸಮಯ.`,moderate:(h,gn)=>`ಗುರು ${h}ನೇ ಭಾವದಲ್ಲಿ ${gn}ದಲ್ಲಿ — ಸ್ಥಿರ ವರ್ಷ.`},
mahaDesc:(mp,ap)=>`${mp} ಮಹಾದಶ${ap?', '+ap+' ಅಂತರ್ದಶ,':''} ಈ ಕಾಲ ನಿಯಂತ್ರಿಸುತ್ತದೆ. `,

},

sadeSatiDesc:{rising:'శని జన్మ చంద్రుని నుండి ద్వాదశ భావంలో — సాడేసాటి ఆరంభం. సరళత మరియు ఆంతరిక దృఢత పెంచుకోండి.',peak:'శని నేరుగా జన్మ చంద్రునిపై — తీవ్ర దశ. ధైర్యం మరియు ధార్మిక కార్యం పరిష్కారం.',setting:'శని ద్వితీయ భావంలో — సాడేసాటి ముగింపు. స్థిరత్వం తిరిగొస్తోంది.',none:''},

moonMod:(h)=>`${h}வது இடம் — நிலையான, சமநிலை நாள். வழக்கமான பணி சுமூகம்.`,
sadeSatiDesc:{rising:'சனி ஜன்ம சந்திரனிலிருந்து பன்னிரண்டாம் இடத்தில் — சாடேசாட்டி ஆரம்பம். எளிமை மற்றும் உள் நெகிழ்ச்சி வளர்க்கவும்.',peak:'சனி ஜன்ம சந்திரன் மீது நேரடியாக — உச்ச கட்டம். பொறுமை மற்றும் தர்ம செயல்கள் தீர்வு.',setting:'சனி இரண்டாம் இடத்தில் — சாடேசாட்டி முடிவு கட்டம். ஸ்திரம் திரும்புகிறது.',none:''},

jupDesc:{good:(h,gn)=>`குரு ஜன்ம லக்னத்திலிருந்து ${h}வது இடத்தில் ${gn}லில் — மிகவும் சுபம். விரிவாக்கம் மற்றும் ஞானம் செயலில்.`,challenging:(h,gn)=>`குரு ${h}வது இடத்தில் — கற்றல் மற்றும் சுத்திகரிப்பு காலம்.`,moderate:(h,gn)=>`குரு ${h}வது இடத்தில் ${gn}லில் — நிலையான வருடம்.`},
mahaDesc:(mp,ap)=>`${mp} மகாதசை${ap?', '+ap+' அந்தர்தசை,':''} இக்காலத்தை நிர்வகிக்கிறது. `,

function localizePanchang(pan, lang) {
  if (!pan || lang === 'en') return pan;
  const tA=L_TITHI[lang]||L_TITHI.en, vA=L_VARA[lang]||L_VARA.en, pO=L_PAKSHA[lang]||L_PAKSHA.en;
  const yA=L_YOGA_PANCH[lang]||L_YOGA_PANCH.en, kA=L_KARANA[lang]||L_KARANA.en, nA=L_NAKS[lang]||L_NAKS.en;
  const ti=pan.tithiIdx!=null?(tA[pan.tithiIdx]||pan.tithi.split(' (')[0])+' ('+(pO[pan.pakshaKey]||'')+')':pan.tithi;
  const va=pan.varaIdx!=null?(vA[pan.varaIdx]||pan.vara):pan.vara;
  const na=pan.nakIdx!=null?(nA[pan.nakIdx]||pan.nakshatra):pan.nakshatra;
  const yo=pan.yogaIdx!=null?(yA[pan.yogaIdx]||pan.yoga):pan.yoga;
  const ka=pan.karanaIdx!=null?(kA[pan.karanaIdx]||pan.karana):pan.karana;
  return{tithi:ti,vara:va,nakshatra:na,yoga:yo,karana:ka};
}

  kn: {
    moonDesc: (tM,hM,nM,hN)=>`ಗೋಚರ ಚಂದ್ರ ${tM} ದಲ್ಲಿ ನಿಮ್ಮ ${hM} ಭಾವವನ್ನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತಿದೆ. ಜನ್ಮ ಚಂದ್ರ ${nM} ದಲ್ಲಿ ${hN}ನೇ ಭಾವದಲ್ಲಿದ್ದು ಭಾವನಾತ್ಮಕ ಅಗತ್ಯಗಳನ್ನು ತಿಳಿಸುತ್ತದೆ.`,
    m2_1: `ಇದು ಆತ್ಮ-ಚಿಂತನೆ ಮತ್ತು ಭಾವನಾತ್ಮಕ ಸ್ಪಷ್ಟತೆಯ ಸಮಯ. ನಿಮ್ಮ ಅಂತಃಪ್ರಜ್ಞೆಯನ್ನು ನಂಬಿ.`,
    m2_6: `ಆರನೇ ಭಾವವು ಅಡೆತಡೆಗಳನ್ನು ನಿವಾರಿಸಲು ಮಾನಸಿಕ ಶಕ್ತಿಯನ್ನು ನೀಡುತ್ತದೆ. ಆರೋಗ್ಯದ ಕಡೆ ಗಮನಹರಿಸಿ.`,
    m2_7: `ಪಾಲುದಾರಿಕೆ ಮತ್ತು ಸಂಬಂಧಗಳು ಬಲಗೊಳ್ಳುತ್ತವೆ. ಮಾತುಕತೆಗಳಿಗೆ ಇದು ಶುಭ ಸಮಯ.`,
    m2_10: `ನಿಮ್ಮ ಭಾವನಾತ್ಮಕ ಒಲವು ಸಾರ್ವಜನಿಕ ಚಿತ್ರಣದ ಕಡೆಗಿದೆ. ವೃತ್ತಿಯಲ್ಲಿ ಗೋಚರತೆ ಹೆಚ್ಚಾಗುತ್ತದೆ.`,
    m2_def: `ಈ ಸ್ಥಾನವು ಕುಂಡಲಿಯ ಪ್ರಕಾರ ಜೀವನದ ವಿವಿಧ ಕ್ಷೇತ್ರಗಳನ್ನು ಸಕ್ರಿಯಗೊಳಿಸುತ್ತದೆ.`,
    m_foot: `ಚಂದ್ರನು ಪ್ರತಿ ರಾಶಿಯಲ್ಲಿ 2.3 ದಿನಗಳಿರುತ್ತಾನೆ, ಇದು ದೈನಂದಿನ ಭಾವನೆಗಳ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ.`,
    jupDesc: (tJ,hJ,nJ,hNJ)=>`ಜ್ಞಾನ ಮತ್ತು ಸೌಭಾಗ್ಯದ ಅಧಿಪತಿ ಗುರುವು ನಿಮ್ಮ ${hJ}ನೇ ಭಾವದಲ್ಲಿ ${tJ} ದಲ್ಲಿ ಗೋಚರಿಸುತ್ತಿದ್ದಾನೆ. ಜನ್ಮ ಗುರುವು ${nJ} (${hNJ}ನೇ ಭಾವ) ದಲ್ಲಿದ್ದು ವಿಸ್ತರಣೆಯ ಹಾದಿ ತೋರುತ್ತಾನೆ—`,
    j_ret: `ಗುರುವು ಪ್ರಸ್ತುತ ತನ್ನ ಜನ್ಮ ಸ್ಥಾನಕ್ಕೆ ಮರಳಿದ್ದಾನೆ. ಇದು 12 ವರ್ಷಗಳಿಗೊಮ್ಮೆ ಬರುವ ಶಕ್ತಿಯುತ ಬದಲಾವಣೆ.`,
    j_nret: `ಇದು ಪ್ರಸ್ತುತ ಗೋಚರಕ್ಕಿಂತ ಭಿನ್ನವಾಗಿದ್ದು ಯಶಸ್ಸಿನ ವಿವಿಧ ಮಾರ್ಗಗಳನ್ನು ತೆರೆಯುತ್ತದೆ.`,
    jrules: (r)=>`ಗುರುವು ನಿಮ್ಮ ಕುಂಡಲಿಯಲ್ಲಿ ${r} ಭಾವದ ಅಧಿಪತಿ. ಈ ಗೋಚಾರವು ಈ ಕ್ಷೇತ್ರಗಳನ್ನು ಜಾಗೃತಗೊಳಿಸುತ್ತದೆ—`,
    j_h9: `ತತ್ವಶಾಸ್ತ್ರ, ಪ್ರಯಾಣ ಮತ್ತು ಉನ್ನತ ಶಿಕ್ಷಣಕ್ಕೆ ಒತ್ತು; `,
    j_h12: `ವಿದೇಶಿ ಅವಕಾಶಗಳು ಮತ್ತು ಆಧ್ಯಾత్మిక ಸಾಧನೆ ವಿಸ್ತರಿಸುತ್ತದೆ. `,
    j_fort: `ಈ ಭಾವಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಕಾರ್ಯಗಳಿಗೆ ಇದು ಅತ್ಯಂತ ಶುಭ ಸಮಯ.`,
    j_ref: `ಈ ಗೋಚಾರವು ಈ ಕ್ಷೇತ್ರಗಳನ್ನು ಪರಿಷ್ಕರಿಸುತ್ತದೆ.`,
    j_foot: `ಗುರುವು ಒಂದು ರಾಶಿಯಲ್ಲಿ 13 ತಿಂಗಳುಗಳಿರುತ್ತಾನೆ. ಉಚ್ಚ ಸ್ಥಿತಿಯಲ್ಲಿ ಶುಭ ಫಲ ಹೆಚ್ಚಾಗುತ್ತದೆ.`,
    satDesc: (tS)=>`ಕರ್ಮ ಮತ್ತು ಪ್ರಬುದ್ಧತೆಯ ಗ್ರಹ ಶನಿಯು ${tS} ದಲ್ಲಿ ಗೋಚರಿಸುತ್ತಿದ್ದಾನೆ.`,
    s_sade_r: `ನೀವು ಸಾಡೇಸಾತಿಯ ಮೊದಲ ಹಂತದಲ್ಲಿದ್ದೀರಿ. ಹಳೆಯ ಅಭ್ಯಾಸಗಳನ್ನು ಬಿಡಲು ಮತ್ತು ಮರುಮೌಲ್ಯಮಾಪನ ಮಾಡಲು ಇದು ಸಮಯ.`,
    s_sade_p: `ನೀವು ಸಾಡೇಸಾತಿಯ ಉತ್ತುಂಗದಲ್ಲಿದ್ದೀರಿ. ಇದು ತಾಳ್ಮೆ ಮತ್ತು ಧರ್ಮದ ಸಮಯ.`,
    s_sade_s: `ನೀವು ಸಾಡೇಸಾತಿಯ ಅಂತಿಮ ಹಂತದಲ್ಲಿದ್ದೀರಿ. ಸ್ಥಿರತೆ ಮರಳುತ್ತಿದೆ.`,
    s_kan: `ಕಂಟಕ ಶನಿಯ ಪ್ರಭಾವವಿದೆ, ಇದು ಮಾನಸಿಕ ಆಳ ಮತ್ತು ನಷ್ಟದ ವಿಷಯಗಳನ್ನು ತರುತ್ತದೆ. ಧ್ಯಾನ ಮತ್ತು ಧರ್ಮ ಪಾಲಿಸಿ.`,
    s_base: (tS,nS,hNS)=>`ಶನಿಯು ${tS} ದಲ್ಲಿ ಗೋಚರಿಸುತ್ತ ಜವಾಬ್ದಾರಿಯನ್ನು ಹೆಚ್ಚಿಸುತ್ತಿದೆ. ಜನ್ಮ ಶನಿಯು ${nS} (${hNS}ನೇ ಭಾವ) ದಲ್ಲಿದ್ದಾನೆ.`,
    srules: (r)=>`ಶನಿಯು ಕುಂಡಲಿಯಲ್ಲಿ ${r} ಭಾವದ ಅಧಿಪತಿ. ಈ ಗೋಚಾರದಲ್ಲಿ—`,
    s_h10: `ಕಾರ್ಯ ಮತ್ತು ಕರ್ತವ್ಯ, `,
    s_h11: `ಲಾಭ ಮತ್ತು ಸಾಮಾಜಿಕ ಜಾಲಗಳು, `,
    s_h6: `ಶತ್ರು ಮತ್ತು ಅಡೆತಡೆಗಳು—`,
    s_build: `ಶನಿಯ ಗಂಭೀರ ಪ್ರಭಾವಕ್ಕೆ ಒಳಗಾಗುತ್ತವೆ. ದೀರ್ಘಕಾಲೀನ ನಿರ್ಮಾಣ ಮಾಡಿ.`,
    s_foot: `ಶನಿಯು ಒಂದು ರಾಶಿಯಲ್ಲಿ 2.5 ವರ್ಷವಿರುತ್ತಾನೆ. ಅವನ ಮರಳುವಿಕೆ ಪ್ರಮುಖ ಅಧ್ಯಾಯಗಳನ್ನು ತರುತ್ತದೆ.`,
    dasha: (m,r,h,s)=>`ನೀವು ${m} ಮಹಾದಶೆಯಲ್ಲಿದ್ದೀರಿ. ${m} ಕುಂಡಲಿಯ ${h}ನೇ ಭಾವದಲ್ಲಿ ${r} ದಲ್ಲಿದ್ದು ${s} ಆಗಿದ್ದಾನೆ.`,
    drules: (r)=>`ಇದು ${r} ಭಾವಗಳ ಅಧಿಪತಿ.`,
    antar: (a,r,h,s)=>`ಪ್ರಸ್ತುತ ${a} ಅಂತರ್ದಶೆಯು ನಿಮ್ಮ ದೈನಂದಿನ ಅನುಭವವನ್ನು ನಿರ್ದೇಶಿಸುತ್ತಿದೆ. ಇದು ${r} (${h}ನೇ ಭಾವ) ದಲ್ಲಿದ್ದು ${s} ಆಗಿದೆ.`,
    d_rel: `ಈ ಎರಡು ಗ್ರಹಗಳ ಸಂಬಂಧವು ಈ ಕಾಲದ ಸುಗಮತೆ ಅಥವಾ ಘರ್ಷಣೆಯನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ.`,
    d_cyc: `ವಿಂಶೋತ್ತರಿ ದಶೆಯು ಜೀವನವನ್ನು 9 ಅವಧಿಗಳಾಗಿ ವಿಭಜಿಸುತ್ತದೆ ಮತ್ತು ಕರ್ಮ ಫಲದ ಸಮಯವನ್ನು ತಿಳಿಸುತ್ತದೆ.`,
    d_wind: `ದಶೆಯನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ಪ್ರಕೃತಿಯ ಹರಿವಿನೊಂದಿಗೆ ಸಾಗಿದಂತೆ.`,
    w1: `ಈ ಕುಂಡಲಿಯು ನಿಮ್ಮನ್ನು ಬ್ರಹ್ಮಾಂಡದ ಶಕ್ತಿಯೊಂದಿಗೆ ಸಮನ್ವಯಗೊಳಿಸುವ ಆಹ್ವಾನ.`,
    w2: `ಧರ್ಮ ಪಾಲಿಸುವುದರಿಂದ ಗ್ರಹಗಳ ಶಕ್ತಿಯ ಲಾಭ ಪಡೆಯಬಹುದು.`,
    w3: `ನಿಮ್ಮ ಜನ್ಮಕುಂಡಲಿ ಜೈಲಲ್ಲ, ಆತ್ಮದ ವಿಕಾಸದ ನಕ್ಷೆ.`,
    w4: `ಗ್ರಹಗಳು ನಿಮ್ಮ ಆಂತರಿಕ ಪ್ರಕೃತಿಯನ್ನು ತೋರಿಸುತ್ತವೆ. ಇದನ್ನು ಅರಿಯುವುದೇ ನಿಜವಾದ ಸ್ವಾತಂತ್ರ್ಯ.`
  },
  te: {
    moonDesc: ()=>`గోచర చంద్రుడు మీ భావాన్ని ప్రభావితం చేస్తున్నాడు మరియు భావోద్వేగాలను జాగృతం చేస్తున్నాడు.`,
    m2_1: `ఇది ఆత్మ-చింతన మరియు భావోద్వేగ స్పష్టతకు సమయం. మీ అంతఃప్రజ్ఞను నమ్మండి.`,
    m2_6: `ఆరవ భావం సవాళ్లను అధిగమించడానికి మానసిక శక్తిని ఇస్తుంది. ఆరోగ్యంపై దృష్టి పెట్టండి.`,
    m2_7: `భాగస్వామ్యాలు మరియు సంబంధాలు బలపడతాయి. వివాహానికి మరియు ఒప్పందాలకు ఇది శుభ సమయం.`,
    m2_10: `మీ భావోద్వేగ శక్తి ప్రజా గుర్తింపుతో సమలేఖనం అవుతుంది. వృత్తిలో అభివృద్ధి సాధ్యం.`,
    m2_def: `ఈ స్థానం మీ జన్మ పటం ఆధారంగా జీవితంలోని వివిధ కోణాలను ప్రభావితం చేస్తుంది.`,
    m_foot: `చంద్రుడు ప్రతి రాశిలో 2.3 రోజులు ఉంటాడు. కాబట్టి రోజువారీ భావోద్వేగాలను ఎక్కువగా ప్రభావితం చేస్తాడు.`,
    jupDesc: (tJ,hJ,nJ,hNJ)=>`జ్ఞానం మరియు అదృష్టానికి అధిపతి గురువు మీ ${hJ}వ భావంలో ${tJ}లో సంచరిస్తున్నాడు. జన్మ గురువు ${nJ} (${hNJ}వ భావం).`,
    j_ret: `గురువు దాదాపు 12 సంవత్సరాలకు తన జన్మ స్థానానికి తిరిగి రావడం ఆధ్యాత్మిక అభివృద్ధిని ఇస్తుంది.`,
    j_nret: `విభిన్న మార్గాల ద్వారా ఆశీర్వాదాలను సూచిస్తుంది.`,
    jrules: (r)=>`గురువు మీ చార్టులో ${r} స్థానాలను పాలిస్తాడు. ఈ సంచారం ఈ విషయాలను క్రియాశీలం చేస్తుంది—`,
    j_h9: `మతం, ప్రయాణం మరియు ఉన్నత విద్యపై దృష్టి పడుతుంది; `,
    j_h12: `విదేశీ అవకాశాలు మరియు ఆధ్యాత్మికత పెరుగుతాయి. `,
    j_fort: `ఈ గృహాలకు సంబంధించిన ప్రయత్నాలకు ఇది మంచి సమయం.`,
    j_ref: `ఈ సంచారం ఈ రంగాలను మెరుగుపరుస్తుంది.`,
    j_foot: `గురువు ప్రతి రాశిలో 13 నెలలు ఉంటాడు. ఉచ్చ స్థానంలో ఉన్నప్పుడు అతని ఆశీర్వాదాలు పెరుగుతాయి.`,
    satDesc: (tS)=>`శని కర్మ మరియు పరిణతి గ్రహం. ప్రస్తుతం ${tS}లో గోచారం చేస్తున్నాడు.`,
    s_sade_r: `మీరు సాడేసాటి మొదటి దశలో ఉన్నారు. ఇది ఏడు సంవత్సరాల చక్రం. కర్మలను శుద్ధి చేస్తుంది.`,
    s_sade_p: `మీరు సాడేసాటి పరాకాష్టలో ఉన్నారు. సహనం మరియు ధర్మం మీకు రక్ష.`,
    s_sade_s: `మీరు సాడేసాటి ముగింపులో ఉన్నారు. ఇది జ్ఞానాన్ని మరియు స్థిరత్వాన్ని ఇస్తుంది.`,
    s_kan: `కంటక శని ప్రభావం ఉంది. ప్రార్థన చేయండి మరియు ప్రమాదాలకు దూరంగా ఉండండి.`,
    s_base: (tS,nS,hNS)=>`శని ${tS}లో సంచరిస్తూ బాధ్యతలను స్థాపిస్తున్నాడు. మీ జన్మ శని ${nS}లో (${hNS}వ భావం) ఉన్నాడు.`,
    srules: (r)=>`శని మీ చార్టులో ${r} గృహాలను పాలిస్తాడు—`,
    s_h10: `కెరీర్ మరియు విధి, `,
    s_h11: `లాభాలు మరియు సమాజం, `,
    s_h6: `శత్రువులు మరియు అడ్డంకులు—`,
    s_build: `వీటిపై శని ప్రభావం ఉంటుంది. క్రమశిక్షణతో పని చేయండి.`,
    s_foot: `శని ప్రతి రాశిలో 2.5 సంవత్సరాలు ఉంటాడు. శని తిరిగి రావడం జీవితంలో ముఖ్య మార్పులను తెస్తుంది.`,
    dasha: (m,r,h,s)=>`మీరు ${m} మహాదశలో ఉన్నారు. ఇది ${r}లో (${h}వ భావం) ${s} స్థితిలో ఉంది.`,
    drules: (r)=>`ఈ గ్రహం ${r} భావాలను పాలిస్తుంది.`,
    antar: (a,r,h,s)=>`${a} అంతర్దశ రోజువారీ అనుభవాలను నిర్దేశిస్తుంది. ఇది ${r} (${h}వ భావం)లో ${s} స్థితిలో ఉంది.`,
    d_rel: `ఈ రెండు గ్రహాల సంబంధం ఈ కాలం ఎంత సాఫీగా సాగుతుందో నిర్ణయిస్తుంది.`,
    d_cyc: `వింశోత్తరి దశ మీ జీవితాన్ని 9 కాలాలుగా విభజిస్తుంది. మరియు కర్మ ఫలితాల సమయాన్ని చెబుతుంది.`,
    d_wind: `దశలను అర్థం చేసుకోవడం ప్రకృతితో కలిసి జీవించడంలో సహాయపడుతుంది.`,
    w1: `ఈ కుండలి మిమ్మల్ని విశ్వ శక్తులతో సమకాలీకరించడానికి ఒక ఆహ్వానం.`,
    w2: `ధర్మాన్ని ఆచరించడం ద్వారా మీరు గ్రహాల శక్తిని పొందగలరు.`,
    w3: `మీ జాతకం జైలు కాదు, ఆత్మ అభివృద్ధికి మార్గం.`,
    w4: `గ్రహాలు మీ అంతర్గత స్వభావాన్ని ప్రతిబింబిస్తాయి. దీనిని అర్థం చేసుకోవడమే నిజమైన స్వేచ్ఛ.`
  },
  ta: {
    moonDesc: ()=>`கோச்சார சந்திரன் உங்கள் உணர்வுகளையும் அனுபவங்களையும் செயல்படுத்துகிறார்.`,
    m2_1: `இது அகமுக மற்றும் உணர்வுத் தெளிவுக்கான நேரம். உங்கள் உள்ளுணர்வை நம்புங்கள்.`,
    m2_6: `ஆறாம் இடம் தடைகளை முறியடிக்கும் ஆற்றலைத் தருகிறது. ஆரோக்கியத்தில் கவனம் செலுத்துங்கள்.`,
    m2_7: `கூட்டாண்மைகள் மற்றும் உறவுகள் பலப்படுத்தப்படும். திருமணத்திற்கும் பேச்சுவார்த்தைகளுக்கும் இது நல்ல நேரம்.`,
    m2_10: `உங்கள் ஆற்றல் சமூக நற்பெயருடன் இணைகிறது. தொழில் முன்னேற்றம் சாத்தியம்.`,
    m2_def: `இந்த நிலை உங்கள் பிறப்பு ஜாதகத்தின்படி பல்வேறு பகுதிகளைச் செயல்படுத்துகிறது.`,
    m_foot: `சந்திரன் ஒவ்வொரு ராசியிலும் 2.3 நாட்கள் இருக்கிறார். இது அன்றாட உணர்வுகளை பாதிக்கின்றது.`,
    jupDesc: (tJ,hJ,nJ,hNJ)=>`ஞானம் மற்றும் அதிர்ஷ்டத்தின் அதிபதி குரு உங்கள் ${hJ}வது இடத்தில் ${tJ}ல் செல்கிறார். ஜென்ம குரு ${nJ} (${hNJ}வது இடம்).`,
    j_ret: `குரு சுமார் 12 ஆண்டுகளுக்கு ஒருமுறை தன் சொந்த இடத்திற்குத் திரும்புவது ஆன்மீக வளர்ச்சியைக் குறிக்கிறது.`,
    j_nret: `தற்போதைய கோச்சாரத்தை விட மாறுபட்ட நன்மைகளைக் குறிக்கிறது.`,
    jrules: (r)=>`குரு உங்கள் ஜாதகத்தில் ${r} இடங்களை ஆளுகிறார். இந்த கோச்சாரம் இப்பகுதிகளைச் செயல்படுத்துகிறது—`,
    j_h9: `மதம், பயணம் மற்றும் உயர்கல்வி; `,
    j_h12: `வெளிநாட்டு வாய்ப்புகள் மற்றும் ஆன்மீகம் பெருகும். `,
    j_fort: `இந்த வீடுகளுடன் தொடர்புடைய முயற்சிகளுக்கு இது மிகச் சிறந்த நேரம்.`,
    j_ref: `இந்த கோச்சாரம் இப்பகுதிகளை மேம்படுத்துகிறது.`,
    j_foot: `குரு ஒரு ராசியில் 13 மாதங்கள் தங்குவார். உச்ச நிலையில் அவரது ஆசீர்வாதம் அதிகரிக்கும்.`,
    satDesc: (tS)=>`சனி கர்மா மற்றும் முதிர்ச்சியின் கிரகம். தற்போது தங்கியிருக்கும் இடம் ${tS}.`,
    s_sade_r: `நீங்கள் ஏழரைச் சனியின் முதல் கட்டத்தில் உள்ளீர்கள். இது பழைய பழக்கங்களை விடுவதற்கான காலம்.`,
    s_sade_p: `நீங்கள் ஏழரைச் சனியின் உச்சகட்டத்தில் உள்ளீர்கள். பொறுமையும் தருமமும் உங்களைக் காக்கும்.`,
    s_sade_s: `நீங்கள் ஏழரைச் சனியின் இறுதிக்கட்டத்தில் உள்ளீர்கள். இது ஞானத்தையும் நிலைத்தன்மையையும் தருகிறது.`,
    s_kan: `கண்டகச் சனியின் ஆதிக்கம் உள்ளது. பிரார்த்தனை செய்யுங்கள், ஆபத்துகளைத் தவிருங்கள்.`,
    s_base: (tS,nS,hNS)=>`சனி ${tS}ல் சஞ்சரித்து பொறுப்பை ஏற்படுத்துகிறார். உங்கள் ஜென்ம சனி ${nS}ல் (${hNS}வது இடம்) உள்ளார்.`,
    srules: (r)=>`சனி உங்கள் ஜாதகத்தில் ${r} வீடுகளை ஆளுகிறார்—`,
    s_h10: `தொழில் மற்றும் கடமை, `,
    s_h11: `லாபங்கள் மற்றும் சமூகம், `,
    s_h6: `எதிரிகள் மற்றும் தடைகள்—`,
    s_build: `இவற்றின் மேல் சனியின் தாக்கம் இருக்கும். ஒழுங்காகப் பணியாற்றுங்கள்.`,
    s_foot: `சனி ஒவ்வொரு ராசியிலும் 2.5 ஆண்டுகள் தங்குவார். சனியின் வருகை வாழ்க்கையில் முக்கிய மாற்றங்களைத் தரும்.`,
    dasha: (m,r,h,s)=>`நீங்கள் ${m} மகாதசையில் உள்ளீர்கள். இது ${r}ல் (${h}வது இடம்) ${s} நிலையில் உள்ளது.`,
    drules: (r)=>`இந்த கிரகம் ${r} இடங்களை ஆளுகிறது.`,
    antar: (a,r,h,s)=>`${a} அந்தர்தசை அன்றாட அனுபவங்களை நிர்ணயிக்கிறது. இது ${r} (${h}வது இடம்)ல் ${s} நிலையில் உள்ளது.`,
    d_rel: `இந்த இரு கிரகங்களின் உறவு இக்காலகட்டம் எவ்வளவு சீராகச் செல்லும் என்பதை தீர்மானிக்கின்றது.`,
    d_cyc: `விம்சோத்தரி தசை உங்கள் வாழ்க்கையை 9 காலங்களாகப் பிரித்து கர்மா பலனும் நேரத்தையும் கூறுகின்றது.`,
    d_wind: `தசைகளைப் புரிந்துகொள்வது இயற்கையுடன் இணைந்து வாழ உதவுகிறது.`,
    w1: `இந்தக் குண்டலி உங்களை பிரபஞ்சச் சக்தியோடு ஒத்திசைக்க அழைக்கிறது.`,
    w2: `தருமத்தைப் பின்பற்றுவதன் மூலம் கிரகங்களின் சக்தியைப் பயன்படுத்தலாம்.`,
    w3: `உங்கள் ஜாதகம் ஒரு சிறை அல்ல, ஆன்மாவின் வளர்ச்சிக்கான வரைபடம்.`,
    w4: `கிரகங்கள் உங்கள் அக இயல்பைப் பிரதிபலிக்கின்றன. புரிந்துகொள்வதே உண்மையான சுதந்திரம்.`
  },
  sa: {
    moonDesc: ()=>`गोचरचन्द्रः भवतः भावं प्रभावितं करोति।`,m2_1:`इदं आत्मचिन्तनस्य समयः।`,m2_6:`षष्ठभावः बाधाः पारयितुं बलं ददाति।`,m2_7:`सम्बन्धाः प्रबलाः भवन्ति।`,m2_10:`प्रतिष्ठा वर्धते।`,m2_def:`अयं गोचरः जीवनस्य विविधक्षेत्राणि जाग्रति।`,m_foot:`चन्द्रः सार्धद्विदिनं यावत् एकस्यां राशौ तिष्ठति।`,jupDesc: (tJ,hJ,nJ,hNJ)=>`ज्ञानस्य सुखस्य च स्वामी गुरुः ${tJ} इत्यत्र ${hJ}तमे भावे सञ्चरति। जन्मगुरुः ${nJ} (${hNJ}तमे भावे) अस्ति।`,j_ret:`गुरुः स्वजन्मस्थाने प्रविशति।`,j_nret:`जन्मगुरुः भिन्नमार्गं दर्शयति।`,jrules: (r)=>`गुरुः कुण्डल्यां ${r} भावानां स्वामी।`,j_h9:`तत्वज्ञानं यात्रा च वर्धते।`,j_h12:`विदेशयोगः अध्यात्मञ्च वर्धते।`,j_fort:`इदं अतीव शुभो कालः।`,j_ref:`अयं गोचरः एतानि क्षेत्राणि पुनाति।`,j_foot:`गुरुः त्रयोदशमासान् एकस्यां राशौ वसति।`,satDesc: (tS)=>`कर्मफलदाता शनिः ${tS} इत्यत्र प्रविशति।`,s_sade_r:`साढेसात्याः प्राथमिकचरणम्।`,s_sade_p:`साढेसात्याः उच्चतमः चरणः। धैर्यं रक्षतु।`,s_sade_s:`साढेसात्याः अन्तिमचरणः।`,s_kan:`कण्टकशनिः क्लेशान् ददाति।`,s_base: (tS,nS,hNS)=>`शनिः दायित्वं वर्धयति। जन्मशनिः ${nS} (${hNS}तमे भावे) अस्ति।`,srules: (r)=>`शनिः ${r} भावान् पालयति।`,s_h10:`कर्मः कर्तव्यञ्च, `,s_h11:`लाभाः मित्राणि च, `,s_h6:`शत्रवः रोगाश्च— `,s_build:`अत्र शनेः पूर्णप्रभावः भविष्यति।`,s_foot:`शनिः सार्धवर्षद्वयं राशौ तिष्ठति।`,dasha: (m,r,h,s)=>`सम्प्रति ${m} महादशा चलति। इदं ${h}तमे भावे ${s}रूपेण अस्ति।`,drules: (r)=>`अस्य ${r} भावेषु आधिपत्यम्।`,antar: (a,r,h,s)=>`अन्तर्दशा ${a} अस्ति, सा ${h}तमे भावे ${s} अस्ति।`,d_rel:`उभयोः सम्बन्धः फलनिर्णायकः।`,d_cyc:`विंशोत्तरी दशा कर्मफलं सूचयति।`,d_wind:`दशाज्ञानं प्रकृत्या सह जीवनम्।`,w1:`इदं कुण्डलीविज्ञानं मार्गदर्शकम्।`,w2:`धर्मस्य आचरणेन फलाप्तिः।`,w3:`कुण्डली मोक्षस्य द्वारम्।`,w4:`अन्तर्ज्ञानमेव स्वतन्त्रता।`
  },

  ml: {moonDesc: ()=>`ഗോചര ചന്ദ്രൻ നിങ്ങളുടെ വൈകാരികതയെ ഉണർത്തുന്നു.`,m2_1:`ഇത് ആത്മപരിശോധനക്കുള്ള സമയമാണ്.`,m2_6:`ആറാം ഭാവം തടസ്സങ്ങളെ മറികടക്കാൻ ശക്തി നൽകുന്നു.`,m2_7:`ബന്ധങ്ങൾ മെച്ചപ്പെടും.`,m2_10:`ജോലിയിലും പദവിയിലും പുരോഗതിയുണ്ടാകും.`,m2_def:`ഈ ഗോചരം വിവിധ ജീവിത മേഖലകളെ ബാധിക്കുന്നു.`,m_foot:`ചന്ദ്രൻ ഒരു രാശിയിൽ 2.3 ദിവസം നിൽക്കുന്നു.`,jupDesc: (tJ,hJ,nJ,hNJ)=>`വ്യാഴം നിങ്ങളുടെ ${hJ}-ാം ഭാവത്തിൽ ${tJ}-ൽ ഗോചരം ചെയ്യുന്നു. ജന്മ വ്യാഴം ${nJ}-ലാണ് (${hNJ}-ാം ഭാവം).`,j_ret:`വ്യാഴം തന്റെ ജന്മ സ്ഥാനത്തേക്ക് തിരിച്ചെത്തി.`,j_nret:`ജന്മ വ്യാഴം വ്യത്യസ്തമായ ഒരു പാത കാണിക്കുന്നു.`,jrules: (r)=>`നിങ്ങളുടെ ജാതകത്തിൽ ${r} ഭാവങ്ങളുടെ അധിപനാണ് വ്യാഴം.`,j_h9:`തത്വചിന്തയും യാത്രകളും വർദ്ധിക്കും.`,j_h12:`ആത്മീയ പുരോഗതിയുണ്ടാകും.`,j_fort:`ഇത് വളരെ അനുകൂലമായ സമയമാണ്.`,j_ref:`ഈ ഗോചരം ഈ മേഖലകളെ ശുദ്ധീകരിക്കുന്നു.`,j_foot:`വ്യാഴം ഒരു രാശിയിൽ 13 മാസം തുടരും.`,satDesc: (tS)=>`ശനി ${tS}-ൽ ഗോചരം ചെയ്യുന്നു.`,s_sade_r:`നിങ്ങൾ ഏഴര ശനിയുടെ ആദ്യ ഘട്ടത്തിലാണ്.`,s_sade_p:`നിങ്ങൾ ഏഴര ശനിയുടെ കൊടുമുടിയിലാണ്. ക്ഷമ വേണം.`,s_sade_s:`നിങ്ങൾ ഏഴര ശനിയുടെ അവസാന ഘട്ടത്തിലാണ്.`,s_kan:`കണ്ടക ശനിയുടെ സ്വാധീനമുണ്ട്. ശ്രദ്ധിക്കുക.`,s_base: (tS,nS,hNS)=>`ശനി ഉത്തരവാദിത്തങ്ങൾ വർദ്ധിപ്പിക്കുന്നു. ജന്മ ശനി ${nS}-ലാണ് (${hNS}-ാം ഭാവം).`,srules: (r)=>`ശനി ${r} ഭാവങ്ങളുടെ അധിപനാണ്.`,s_h10:`ജോലിയും കടമകളും, `,s_h11:`നേട്ടങ്ങളും സാമൂഹിക ജീവിതവും, `,s_h6:`ശത്രുക്കളും തടസ്സങ്ങളും— `,s_build:`ഇവയിൽ ശനിയുടെ സ്വാധീനമുണ്ടാകും.`,s_foot:`ശനി ഒരു രാശിയിൽ 2.5 വർഷം നിൽക്കുന്നു.`,dasha: (m,r,h,s)=>`നിങ്ങൾ ${m} മഹാദശയിലാണ്. ഇത് ${h}-ാം ഭാവത്തിൽ ${s}-ആയി നിൽക്കുന്നു.`,drules: (r)=>`ഈ ഗ്രഹം ${r} ഭാവങ്ങളുടെ അധിപനാണ്.`,antar: (a,r,h,s)=>`${a} അന്തർദശ നടക്കുന്നു. ഇത് ${h}-ാം ഭാവത്തിൽ ${s}-ആയി നിൽക്കുന്നു.`,d_rel:`ഇരു ഗ്രഹങ്ങളും തമ്മിലുള്ള ബന്ധം ഫലം നിർണ്ണയിക്കുന്നു.`,d_cyc:`വിംശോത്തരി ദശ 120 വർഷത്തെ ഒരു ചക്രമാണ്.`,d_wind:`ദശകളെ മനസ്സിലാക്കുന്നത് പ്രകൃതിയോട് ഇണങ്ങുന്നതുപോലെയാണ്.`,w1:`നിങ്ങളുടെ ജാതകം ഒരു വഴികാട്ടിയാണ്.`,w2:`ധർമ്മം പാലിക്കുന്നത് ഗ്രഹങ്ങളുടെ അനുഗ്രഹം നൽകുന്നു.`,w3:`ജാതകം ആത്മീയ വളർച്ചയ്ക്കുള്ള ഒരു ഭൂപടമാണ്.`,w4:`സ്വയം അറിയ // Accurate sunrise/sunset using solar declination + hour angle
function sunRiseSet(jd, lat, lng, utcOffset) {
  const T = (jd - 2451545) / 36525;
  const L0 = norm(280.46646 + 36000.76983 * T);
  const M = norm(357.52911 + 35999.05029 * T);
  const C = (1.914602 - 0.004817 * T) * Math.sin(M * DEG) + 0.019993 * Math.sin(2 * M * DEG);
  const sunLon = norm(L0 + C);
  const eps = (23.439 - 0.00013 * T) * DEG;
  const dec = Math.asin(Math.sin(eps) * Math.sin(sunLon * DEG));
  const cosHA = (Math.sin(-0.8333 * DEG) - Math.sin(lat * DEG) * Math.sin(dec)) / (Math.cos(lat * DEG) * Math.cos(dec));
  if (cosHA < -1 || cosHA > 1) return { rise: 6, set: 18 };
  const HA = Math.acos(cosHA) / DEG;
  const lngCorr = lng / 15;
  const B = 2 * Math.PI * ((jd - 2451545) % 365.25) / 365.25;
  const EoT = 229.18 * (0.000075 + 0.001868 * Math.cos(B) - 0.032077 * Math.sin(B) - 0.014615 * Math.cos(2*B) - 0.04089 * Math.sin(2*B)) / 60;
  const solarNoon = 12 - lngCorr - EoT + utcOffset;
  const rise = solarNoon - HA / 15;
  const set = solarNoon + HA / 15;
  return { rise, set };
}

// Format hours (decimal) to HH:MM AM/PM string
function fmtTime(h) {
  const hh = ((Math.floor(h) % 24) + 24) % 24;
  const mm = Math.floor((h % 1) * 60);
  const ap = hh >= 12 ? 'PM' : 'AM';
  return `${hh % 12 || 12}:${String(mm).padStart(2, '0')} ${ap}`;
}

// Rahu Kala, Yamaghanda, Gulika Kala
function inauspiciousPeriods(sunrise, sunset, dayOfWeek) {
  const dayDur = sunset - sunrise;
  const eighth = dayDur / 8;
  const rahuSlot = [8, 2, 7, 5, 6, 4, 3][dayOfWeek];
  const yamaSlot = [5, 4, 3, 2, 1, 7, 6][dayOfWeek];
  const gulikaSlot = [7, 6, 5, 4, 3, 2, 1][dayOfWeek];

  const period = (slot) => {
    const start = sunrise + (slot - 1) * eighth;
    const end = start + eighth;
    return { start, end, str: `${fmtTime(start)} – ${fmtTime(end)}` };
  };

  return {
    rahuKala: period(rahuSlot),
    yamaghanda: period(yamaSlot),
    gulikaKala: period(gulikaSlot)
  };
}

// Abhijit Muhurta (midday auspicious period)
function abhijitMuhurta(sunrise, sunset) {
  const noon = (sunrise + sunset) / 2;
  return { start: noon - 0.4, end: noon + 0.4, str: `${fmtTime(noon - 0.4)} – ${fmtTime(noon + 0.4)}` };
}

// Lunar phase
function lunarPhase(sunLon, moonLon, lang) {
  const elongation = norm(moonLon - sunLon);
  const illumination = (1 - Math.cos(elongation * DEG)) / 2 * 100;
  let idx;
  if (elongation < 22.5) idx = 0;
  else if (elongation < 67.5) idx = 1;
  else if (elongation < 112.5) idx = 2;
  else if (elongation < 157.5) idx = 3;
  else if (elongation < 202.5) idx = 4;
  else if (elongation < 247.5) idx = 5;
  else if (elongation < 292.5) idx = 6;
  else if (elongation < 337.5) idx = 7;
  else idx = 0;
  const phases = L_LUNAR_PHASE[lang] || L_LUNAR_PHASE.en;
  return { illumination: illumination.toFixed(1), phase: phases[idx] };
}

// Hora lord (planetary hour)
function horaLord(sunrise, currentHour, dayOfWeek) {
  const HORA_SEQ = ['sun','moon','mars','mercury','jupiter','venus','saturn'];
  const dayLordIdx = [0, 1, 2, 3, 4, 5, 6][dayOfWeek];
  const hoursSinceSunrise = currentHour - sunrise;
  if (hoursSinceSunrise < 0) return HORA_SEQ[dayLordIdx];
  const horaNum = Math.floor(hoursSinceSunrise);
  return HORA_SEQ[(dayLordIdx + horaNum) % 7];
}

// Approximate moonrise
function approxMoonrise(moonLon, sunLon, sunrise, sunset) {
  const elong = norm(moonLon - sunLon);
  const moonriseHr = sunrise + (elong / 360) * 24.8;
  const normalized = ((moonriseHr % 24) + 24) % 24;
  return normalized;
}

// Chandrabala (Moon strength)
function chandrabala(moonRashi, lagnaRashi) {
  const diff = ((moonRashi - lagnaRashi + 12) % 12) + 1;
  const good = [1, 3, 6, 7, 10, 11];
  return good.includes(diff) ? 'Strong' : 'Weak';
}

// Tarabala (Star strength)
function tarabala(transitNakIdx, birthNakIdx) {
  const diff = ((transitNakIdx - birthNakIdx + 27) % 27);
  const tara = Math.floor(diff / 3) + 1;
  const TARA_NAMES = ['Janma','Sampat','Vipat','Kshema','Pratyari','Sadhaka','Vadha','Mitra','Ati-Mitra'];
  const good = [2, 4, 6, 8, 9];
  return { tara: TARA_NAMES[(tara - 1) % 9], num: tara, good: good.includes(tara) };
}

// House themes for predictions
const HOUSE_THEMES = ['','Self & Personality','Wealth & Family','Courage & Siblings','Home & Happiness','Intelligence & Children','Health & Enemies','Partnerships & Marriage','Transformation & Longevity','Dharma & Fortune','Career & Status','Gains & Aspirations','Losses & Liberation'];

// Planetary lordships (rashi lords)
const SIGN_LORD = ['mars','venus','mercury','moon','sun','mercury','venus','mars','jupiter','saturn','saturn','jupiter'];

// Given a planet key and lagna rashi, find which houses (1-12) that planet rules
function housesRuled(planetKey, lagnaRashi) {
  const houses = [];
  for (let i = 0; i < 12; i++) {
    if (SIGN_LORD[i] === planetKey) {
      houses.push(((i - lagnaRashi + 12) % 12) + 1);
    }
  }
  return houses;
}

  ];
  function getOffset(tz){
    try {
      const d=new Date();
      const str=new Intl.DateTimeFormat('en-US',{timeZone:tz,year:'numeric',month:'numeric',day:'numeric',hour:'numeric',minute:'numeric',second:'numeric',hour12:false}).format(d);
      const[dp,tp]=str.split(', ');const[m,day,y]=dp.split('/');let[h,min,s]=tp.split(':');if(h==='24')h='00';
      const localTime=new Date(Date.UTC(Number(y),Number(m)-1,Number(day),Number(h),Number(min),Number(s)));
      const utcTime=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),d.getUTCHours(),d.getUTCMinutes(),d.getUTCSeconds()));
      return (localTime.getTime()-utcTime.getTime())/3600000;
    } catch {
      return 5.5;
    }
  }
  function searchCity(q){
    const r=FALLBACK.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.disp.toLowerCase().includes(q.toLowerCase()));
    setSuggs(r.slice(0,6));
    fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`)
      .then(r=>r.json()).then(d=>{
        if(d.results&&d.results.length){
          const meteoSuggs=d.results.map(g=>({name:g.name,country:g.country,lat:g.latitude,lng:g.longitude,tz:g.timezone||'UTC',disp:`${g.name}${g.admin1?', '+g.admin1:''}, ${g.country}`}));
          setSuggs(prev=>{
            const existing=new Set(prev.map(p=>p.disp));
            return [...prev, ...meteoSuggs.filter(m=>!existing.has(m.disp))].slice(0, 6);
          });
        }
      }).catch(()=>{});
  }

  function selectCity(c){
    setCityQ(c.disp);
    setForm(f=>({...f,city:c.name,country:c.country,lat:c.lat,lng:c.lng,utcOffset:getOffset(c.tz),timezone:c.tz}));

              {showS&&suggs.length>0&&(
                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'white',border:'1px solid #D4B896',borderRadius:8,boxShadow:'0 4px 20px rgba(0,0,0,0.1)',zIndex:100,maxHeight:200,overflowY:'auto',marginTop:3}}>
                  {suggs.map((c,i)=>(
                    <div key={i} onMouseDown={()=>selectCity(c)}

              )}
              {form.lat&&<p style={{fontSize:11,color:'#10B981',marginTop:4}}>✓ {form.lat.toFixed(3)}°, {form.lng.toFixed(3)}° · {form.timezone}</p>}
            </div>
            {form.country&&<div style={{marginBottom:14}}>
              <label style={LS}>{t('country',lang)}</label>
              <div style={{padding:'9px 12px',borderRadius:8,border:'1px solid #E5D5C0',background:'#FAFAF8',fontSize:14,color:'#6B7280'}}>{form.country}</div>
            </div>}
            <div style={{marginBottom:22}}>
              <label style={{...LS,marginBottom:8}}>{t('gender',lang)}</label>
              <div style={{display:'flex',gap:8}}>
                {[['Male',t('male',lang)],['Female',t('female',lang)],['Other',t('other',lang)]].map(([val,lbl])=>(
                  <button key={val} type="button" onClick={()=>{setForm(f=>({...f,gender:val}));setErrs(er=>({...er,gender:null}))}}
                    style={{flex:1,padding:'9px',borderRadius:8,border:form.gender===val?'2px solid #7C3AED':'1.5px solid #D4B896',background:form.gender===val?'#F5F0FF':'white',color:form.gender===val?'#7C3AED':'#1E3A5F',fontWeight:form.gender===val?700:400,cursor:'pointer',fontSize:14,fontFamily:'inherit',transition:'all 0.15s'}}>

            </div>
            <button type="submit" disabled={loading}

              {loading?t('computing',lang):t('generate',lang)}
            </button>
            {loading&&<div style={{marginTop:12}}>
              <div style={{width:'100%',height:4,background:'#E5D5C0',borderRadius:2,overflow:'hidden'}}>
                <div style={{width:`${prog}%`,height:'100%',background:'linear-gradient(90deg,#7C3AED,#F59E0B)',borderRadius:2,transition:'width 0.12s'}}/>
              </div>
              <p style={{fontSize:11,color:'#7C3AED',marginTop:6,textAlign:'center'}}>{t('inputLoading',lang)}</p>
            </div>}
          </form>
          <div style={{padding:'10px 26px 18px',borderTop:'1px solid #F3F4F6',textAlign:'center'}}>
            <p style={{margin:0,fontSize:11,color:'#9CA3AF'}}>{t('inputPrivacy',lang)}</p>
          </div>
        </div>
      </main>
    </div>
  );

function ForecastSection({K,lang='en'}){
  const FC=L_FORECAST[lang]||L_FORECAST.en;
  const GRAHA=L_GRAHA[lang]||L_GRAHA.en;
  const RASHI_N=L_RASHI[lang]||L_RASHI.en;
  const DASHA_M=L_DASHA[lang]||L_DASHA.en;
  const NAKS_N=L_NAKS[lang]||L_NAKS.en;
  const PR=L_PREDICT[lang]||L_PREDICT.en;
  const utcOff=K.input.utcOffset||5.5;
  // Use browser local time for display date (what the user sees on their clock)
  const browserNow=new Date();
  const localYear=browserNow.getFullYear();
  const localMonth=browserNow.getMonth()+1;
  const localDay=browserNow.getDate();

    (FC.moonD(moonFromNat,tMoonName,natMoonName)+FC.moonMod(moonFromNat));

        />
        <FCard

function makeSVGChart(planets,lagnaR,size,lang='en'){
  const cell=size/4;
  const SI_POS=[[1,0],[2,0],[3,0],[3,1],[3,2],[3,3],[2,3],[1,3],[0,3],[0,2],[0,1],[0,0]];
  const ABBR2=(L_ABBR[lang]||L_ABBR.en);
  const PCLR2={sun:'#F59E0B',moon:'#8B5CF6',mars:'#EF4444',mercury:'#10B981',jupiter:'#D97706',venus:'#EC4899',saturn:'#6366F1',rahu:'#1E3A5F',ketu:'#7C3AED'};
  let s=`<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg" style="border:2px solid #7C3AED;border-radius:6px;background:#FFFCF5;display:block;margin:0 auto">`;
  for(let i=1;i<=3;i++){s+=`<line x1="${cell*i}" y1="0" x2="${cell*i}" y2="${size}" stroke="#D4B896" stroke-width="1"/><line x1="0" y1="${cell*i}" x2="${size}" y2="${cell*i}" stroke="#D4B896" stroke-width="1"/>`;}
  s+=`<rect x="${cell}" y="${cell}" width="${cell*2}" height="${cell*2}" fill="#F8F4FF" stroke="#7C3AED" stroke-width="1.5"/><text x="${size/2}" y="${size/2+8}" text-anchor="middle" font-size="22" fill="#7C3AED" opacity="0.25">☀</text>`;
  SI_POS.forEach(([col,row],ri)=>{
    const x=col*cell,y=row*cell,ps=planets.filter(p=>p.rashi===ri),isL=ri===lagnaR;
    if(isL)s+=`<rect x="${x+1}" y="${y+1}" width="${cell-2}" height="${cell-2}" fill="rgba(124,58,237,0.07)" rx="2"/>`;
    s+=`<text x="${x+3}" y="${y+11}" font-size="9" fill="#C4A882" font-family="Georgia,serif">${ri+1}</text>`;
    if(isL)s+=`<text x="${x+cell-4}" y="${y+11}" font-size="9" fill="#7C3AED" text-anchor="end" font-weight="bold" font-family="Georgia,serif">${(STRINGS[lang]||STRINGS.en)['ch.asc']||'Lg'}</text>`;
    ps.forEach((p,pi)=>{
      const ab=(ABBR2[p.key]||ABBR2[p.key]||p.key.slice(0,2)),fl=(p.retro?'℞':'')+(p.exalted?'↑':p.debil?'↓':''),clr=PCLR2[p.key]||'#1E3A5F';
      s+=`<text x="${x+4}" y="${y+22+pi*13}" font-size="11" fill="${clr}" font-weight="600" font-family="Georgia,serif">${ab}${fl}</text>`;
    });
  });
  return s+'</svg>';
}

  const LAGNA_R=(L_LAGNA[lang]||L_LAGNA.en);

  const sbRows=Object.entries(sb).map(([k,v])=>`<tr><td style="padding:5px 8px;border:1px solid #E5D5C0;font-weight:600">${(L_GRAHA[lang]||L_GRAHA.en)[k]||k}</td><td style="padding:5px 8px;border:1px solid #E5D5C0;text-align:center">${v?.total?.toFixed(1)||'—'}</td><td style="padding:5px 8px;border:1px solid #E5D5C0;text-align:center;color:${v?.cls==='Strong'?'#16A34A':v?.cls==='Weak'?'#DC2626':'#D97706'}">${(v?.cls==='Strong'?(S.shadbala?.strong||S['shadbala.strong']||'Strong'):v?.cls==='Moderate'?(S.shadbala?.moderate||S['shadbala.moderate']||'Moderate'):v?.cls==='Weak'?(S.shadbala?.weak||S['shadbala.weak']||'Weak'):'—')}</td></tr>`).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${S.pdf.title} — ${input.city||''}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;background:white;color:#1E3A5F;font-size:13px;line-height:1.5}@media print{body{margin:0}.no-print{display:none!important}.page-break{page-break-before:always}}h1{font-size:22px;color:#7C3AED;margin-bottom:4px}h2{font-size:16px;color:#1E3A5F;margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid #E5D5C0}h3{font-size:13px;color:#7C3AED;margin:12px 0 6px}table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}th{background:#F5F0FF;color:#7C3AED;text-align:left;padding:7px 8px;border:1px solid #E5D5C0;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}td{padding:6px 8px;border:1px solid #E5D5C0;vertical-align:top}.page{max-width:800px;margin:0 auto;padding:28px 32px}.header-band{background:linear-gradient(135deg,#1E3A5F,#4C1D95,#7C3AED);color:white;padding:20px 32px;margin:-28px -32px 20px}.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}.stat-box{background:#F8F4FF;border:1px solid #E5D5C0;border-radius:6px;padding:10px;text-align:center}.stat-label{font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:2px}.stat-val{font-size:15px;font-weight:700;color:#7C3AED}.stat-sub{font-size:11px;color:#6B7280;margin-top:2px}.panchang-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}.panch-item{background:#FFF7ED;border:1px solid #E5D5C0;border-radius:6px;padding:8px;text-align:center}.chart-row{display:flex;gap:24px;justify-content:center;margin:16px 0}.chart-box{text-align:center}.chart-title{font-size:12px;font-weight:700;color:#7C3AED;margin-bottom:6px}.reading-section{background:#FAFAF8;border:1px solid #E5D5C0;border-radius:8px;padding:14px;margin-bottom:12px}.reading-label{font-size:11px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}.disc{font-size:11px;color:#9CA3AF;font-style:italic;border-top:1px solid #E5D5C0;padding-top:10px;margin-top:10px}.print-btn{display:inline-block;margin:16px 8px 0 0;padding:10px 20px;background:#7C3AED;color:white;border:none;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer}.close-btn{display:inline-block;margin:16px 0 0;padding:10px 20px;background:white;color:#7C3AED;border:1px solid #7C3AED;border-radius:8px;font-family:Georgia,serif;font-size:14px;cursor:pointer}</style></head><body>
<div class="page">
<div class="header-band">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-size:13px;opacity:0.7;letter-spacing:2px;margin-bottom:4px">${S.pdf.by} · ${S.pdf.lahiri} · ${S.pdf.para}</div>
      <h1 style="color:white;font-size:24px;margin-bottom:6px">${S.pdf.title}</h1>
      <div style="font-size:15px;opacity:0.9">${input.city}, ${input.country} &nbsp;·&nbsp; ${formDate}, ${input.tob}</div>
    </div>
    <div style="text-align:right;opacity:0.8;font-size:12px"><div>📍 ${input.lat?.toFixed(3)}°, ${input.lng?.toFixed(3)}°</div><div style="margin-top:4px">${S.pdf?.ayanamsa||S["pdf.ayanamsa"]||"Ayanamsa"}: ${ayanamsaDMS}</div></div>
  </div>
</div>

<div class="stat-grid">
  <div class="stat-box"><span class="stat-label">${S.ov.lagna}</span><span class="stat-val">${(L_RASHI[lang]||L_RASHI.en)[lagna.rashi]}</span><div class="stat-sub">${lagna.degFmt}</div></div>
  <div class="stat-box"><span class="stat-label">${S.ov.moon}</span><span class="stat-val">${(L_RASHI[lang]||L_RASHI.en)[moon.rashi]}</span><div class="stat-sub">${(L_NAKS[lang]||L_NAKS.en)[moon.nIdx]||moon.nakshatraName} ${S['pdf.pada']||'Pd'} ${moon.pada}</div></div>
  <div class="stat-box"><span class="stat-label">${S.ov.sun}</span><span class="stat-val">${(L_RASHI[lang]||L_RASHI.en)[sun2.rashi]}</span><div class="stat-sub">${(L_NAKS[lang]||L_NAKS.en)[sun2.nIdx]||sun2.nakshatraName} ${S['pdf.pada']||'Pd'} ${sun2.pada}</div></div>
</div>

<div class="panchang-grid">
  ${[[S.ov.tithi,lpan.tithi],[S.ov.vara,lpan.vara],[S.ov.nakshatra,lpan.nakshatra],[S.ov.yoga,lpan.yoga],[S.ov.karana,lpan.karana]].map(([l,v])=>`<div class="panch-item"><span class="stat-label">${l}</span><div style="font-size:13px;font-weight:600;color:#1E3A5F">${v}</div></div>`).join('')}
</div>

<div style="background:#F5F0FF;border:1px solid #C4B5FD;border-radius:8px;padding:12px;margin-bottom:16px;display:flex;gap:24px">
  <div><span style="font-size:10px;color:#7C3AED;text-transform:uppercase;letter-spacing:0.5px;display:block">${S.ov.maha}</span><strong style="font-size:16px;color:#1E3A5F">${(L_GRAHA[lang]||L_GRAHA.en)[cur?.planet]||cur?.planet}</strong> <span style="font-size:12px;color:#6B7280">(${cur?.startStr} – ${cur?.endStr})</span></div>
  ${curA?`<div><span style="font-size:10px;color:#D97706;text-transform:uppercase;letter-spacing:0.5px;display:block">${S.ov.antar}</span><strong style="font-size:15px;color:#1E3A5F">${(L_GRAHA[lang]||L_GRAHA.en)[cur?.planet]||cur?.planet}/${(L_GRAHA[lang]||L_GRAHA.en)[curA?.planet]||curA?.planet}</strong> <span style="font-size:12px;color:#6B7280">(${curA?.startStr} – ${curA?.endStr})</span></div>`:''}
  <div><span style="font-size:10px;color:#E11D48;text-transform:uppercase;letter-spacing:0.5px;display:block">${S.ov.birth}</span><strong style="font-size:15px;color:#1E3A5F">${(L_GRAHA[lang]||L_GRAHA.en)[dasha.nakLord]||dasha.nakLord}</strong> <span style="font-size:12px;color:#6B7280">${dasha.nakName}</span></div>
</div>

<div class="chart-row">

</div>

<div class="page-break"></div>

<h2>${S.pl.title}</h2>
<table><thead><tr><th>${S.pl.graha}</th><th>${S.pl.rashi}</th><th>${S.pl.deg}</th><th>${S.pl.nak}</th><th>${S.pl.pada}</th><th>${S.pl.bhava}</th><th>${S.pl.status}</th></tr></thead><tbody>${planetRows}</tbody></table>

<table><thead><tr><th>${S.pl.graha}</th><th>${S['pdf.years']||S.pdf?.years||'Years'}</th><th>${S['pdf.start']||S.pdf?.start||'Start'}</th><th>${S['pdf.end']||S.pdf?.end||'End'}</th><th>${S.da.cur} ${S.ov?.antar||S['pdf.antardasha']||'Antardasha'}</th></tr></thead><tbody>${dashaRows}</tbody></table>

${ys.length>0?`<h2>${S.yo.title}</h2><table><thead><tr><th>${S['pdf.yogaDosha']||'Yoga / Dosha'}</th><th>${S['pdf.type']||'Type'}</th><th>${S['pdf.effect']||'Effect'}</th></tr></thead><tbody>${yogaRows}</tbody></table>`:`<h2>${S.yo.title}</h2><p style="color:#9CA3AF;font-style:italic;margin-bottom:12px">${S.yo.none}</p>`}

<h2>${S.sh.title}</h2>
<table><thead><tr><th>${S['pdf.planet']||'Planet'}</th><th>${S['pdf.totalStrength']||'Total Strength'}</th><th>${S['pdf.classification']||'Classification'}</th></tr></thead><tbody>${sbRows}</tbody></table>

<div class="page-break"></div>

<h2>${S.rd.title}</h2>
<div class="reading-section"><div class="reading-label">${S.rd.lagnaA}</div><p>${LAGNA_R[lagna.rashi]||''}</p></div>
<div class="reading-section"><div class="reading-label">${S.rd.moonA||S.rd?.chandra||''}</div><p>${(L_READING[lang]||L_READING.en).chandra((L_NAKS[lang]||L_NAKS.en)[moon.nIdx]||moon.nakshatraName,(L_RASHI[lang]||L_RASHI.en)[moon.rashi],moon.exalted,moon.retro)}</p></div>
<div class="reading-section"><div class="reading-label">${S.rd.dashaR}</div><p><strong>${(L_GRAHA[lang]||L_GRAHA.en)[cur?.planet]}</strong> ${S.ov.maha} (${cur?.startStr} – ${cur?.endStr}). ${DASHA_M[cur?.planet]||''}${curA&&DASHA_M[curA?.planet]?` <strong>${(L_GRAHA[lang]||L_GRAHA.en)[curA.planet]}</strong> ${S.ov.antar} (${curA?.startStr}–${curA?.endStr}): ${DASHA_M[curA?.planet]}.`:''}</p></div>
${ys.filter(y=>y.type!=='dosha').length>0?`<div class="reading-section"><div class="reading-label">${S.rd.yogaI}</div><p>${ys.filter(y=>y.type!=='dosha').map(y=>{const ly=(L_YOGA[lang]||L_YOGA.en)[y.name]||{name:y.name,effect:y.effect};return`<strong>${ly.name}</strong> — ${ly.effect}`}).join(' &nbsp;·&nbsp; ')}</p></div>`:''}
${ys.filter(y=>y.type==='dosha').length>0?`<div class="reading-section" style="border-left:4px solid #EF4444"><div class="reading-label" style="color:#EF4444">${(L_STATUS[lang]||L_STATUS.en).combust?S.yo?.dosha||'Dosha':'Dosha'}</div><p>${ys.filter(y=>y.type==='dosha').map(y=>{const ly=(L_YOGA[lang]||L_YOGA.en)[y.name]||{name:y.name,effect:y.effect};return`<strong>${ly.name}</strong> — ${ly.effect}`}).join(' &nbsp;·&nbsp; ')}</p></div>`:''}
${strong.length>0?`<div class="reading-section"><div class="reading-label">${S.rd.strengthR}</div><p>${strong.map(k=>(L_GRAHA[lang]||L_GRAHA.en)[k]).join(', ')}${weak.length>0?' · '+weak.map(k=>(L_GRAHA[lang]||L_GRAHA.en)[k]).join(', '):''}</p></div>`:''}
<div class="disc">${S.rd.disc}</div>

<div class="no-print" style="margin-top:20px;border-top:1px solid #E5D5C0;padding-top:16px">

  <button class="close-btn" onclick="window.close()">✕ ${S['pdf.closeBtn']||'Close'}</button>
</div>
</div></body></html>`;
  const w=window.open('','_blank','width=900,height=700,scrollbars=yes');
  if(!w){alert((STRINGS[lang]||STRINGS.en)['popupAlert']||'Please allow popups for this site to download the PDF.');return;}
  w.document.write(html);w.document.close();w.focus();
  setTimeout(()=>{try{w.print();}catch(e){}},800);
}

// RESULTS PAGE
// ════════════════════════════════════════════════════════════════
const TABS_DEF=[
  {id:'overview',label:'Overview',icon:'☀'},
  {id:'predictions',label:'Predictions',icon:'🔮'},
  {id:'charts',label:'Charts',icon:'⊞'},
  {id:'planets',label:'Graha Sthiti',icon:'♃'},
  {id:'dasha',label:'Dasha',icon:'⏳'},
  {id:'yoga',label:'Yoga & Dosha',icon:'⚡'},
  {id:'shadbala',label:'Shadbala',icon:'⚖'},
  {id:'avarga',label:'Ashtakavarga',icon:'🔢'},
  {id:'reading',label:'Expert Reading',icon:'📜'},
];

function ResultsPage({K,onBack,lang,setLang}){
  const[tab,setTab]=React.useState('overview');
  const[fmt,setFmt]=React.useState('south');
  const[copied,setCopied]=React.useState(false);
  const{input,lagna,panchang:pan,ayanamsaDMS,planets}=K;
  const lpan=localizePanchang(pan,lang);
  const formattedDate=new Date(input.year,input.month-1,input.day).toLocaleDateString(lang==='en'?'en-IN':lang==='hi'?'hi-IN':lang==='kn'?'kn-IN':lang==='te'?'te-IN':lang==='ta'?'ta-IN':lang==='mr'?'mr-IN':lang==='gu'?'gu-IN':lang==='bn'?'bn-IN':lang==='ml'?'ml-IN':'en-IN',{day:'numeric',month:'long',year:'numeric'});
  function share(){
    try{
      const d={y:input.year,mo:input.month,d:input.day,h:input.hour,mi:input.minute,ut:input.utcOffset,la:input.lat,ln:input.lng,ci:input.city,co:input.country,tz:input.timezone,ge:input.gender};
      const url=`${location.origin}${location.pathname}?k=${btoa(encodeURIComponent(JSON.stringify(d)))}`;
      navigator.clipboard.writeText(url).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200)});
    }catch(e){}
  }
  return(
    <div style={{minHeight:'100vh',background:'#FAFAF8',fontFamily:"'Noto Serif',Georgia,serif"}}>
      {/* Header */}
      <header className="no-print" style={{background:'white',borderBottom:'1px solid #E5D5C0',padding:'10px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:20,boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={onBack} style={{background:'none',border:'1px solid #E5D5C0',cursor:'pointer',fontSize:14,color:'#7C3AED',padding:'5px 10px',borderRadius:7,fontFamily:'inherit'}}>{t('back',lang)}</button>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <div style={{width:28,height:28,background:'linear-gradient(135deg,#7C3AED,#F59E0B)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:'white',fontSize:14}}>☀</span></div>
            <span style={{fontSize:15,color:'#1E3A5F',fontWeight:700}}>Jyotish Darshan</span>
          </div>
        </div>
        <div style={{display:'flex',gap:7,alignItems:'center'}}>
          <select value={lang} onChange={e=>setLang(e.target.value)} style={{padding:'4px 9px',borderRadius:6,border:'1px solid #D4B896',background:'white',fontFamily:'inherit',fontSize:12,cursor:'pointer'}}>
            {LANGS.map(l=><option key={l.code} value={l.code}>{l.label}</option>)}
          </select>
          <button onClick={share} style={{padding:'5px 12px',borderRadius:6,border:'1px solid #D4B896',background:copied?'#DCFCE7':'white',fontSize:12,cursor:'pointer',fontFamily:'inherit',color:copied?'#16A34A':'#1E3A5F',transition:'all 0.2s'}}>{copied?t('copied',lang):t('share',lang)}</button>
          <button onClick={()=>downloadPDF(K,lang)} style={{padding:'5px 12px',borderRadius:6,border:'1px solid #7C3AED',background:'#7C3AED',color:'white',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>{t('download',lang)}</button>
        </div>
      </header>
      {/* Banner */}
      <div style={{background:'linear-gradient(135deg,#1E3A5F 0%,#4C1D95 60%,#7C3AED 100%)',color:'white',padding:'18px 22px'}}>
        <div style={{maxWidth:1000,margin:'0 auto'}}>
          <h2 style={{margin:'0 0 7px',fontSize:17,fontWeight:600}}>{t('inputTitle',lang)} — {input.city}, {input.country}</h2>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px 24px',fontSize:13,opacity:0.9,marginBottom:10}}>
            <span>📅 {formattedDate}, {input.tob}</span>
            <span>📍 {input.lat?.toFixed(3)}°N, {input.lng?.toFixed(3)}°E</span>
            <span>🔷 {t('ov.ayanamsa',lang)}: {ayanamsaDMS}</span>
            <span>♑ {t('ov.lagna',lang)}: {(L_RASHI[lang]||L_RASHI.en)[lagna.rashi]} {lagna.degFmt}</span>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'5px 8px'}}>
            {[[t('ov.tithi',lang),lpan.tithi],[t('ov.vara',lang),lpan.vara],[t('ov.nakshatra',lang),lpan.nakshatra],[t('ov.yoga',lang),lpan.yoga],[t('ov.karana',lang),lpan.karana]].map(([k,v])=>(
              <span key={k} style={{background:'rgba(255,255,255,0.15)',padding:'3px 10px',borderRadius:20,fontSize:12}}><strong>{k}:</strong> {v}</span>
            ))}
          </div>
        </div>
      </div>
      {/* Tab bar */}
      <div className="no-print" style={{background:'white',borderBottom:'1px solid #E5D5C0',overflowX:'auto',position:'sticky',top:51,zIndex:15,boxShadow:'0 1px 3px rgba(0,0,0,0.04)'}}>
        <div style={{maxWidth:1000,margin:'0 auto',display:'flex',padding:'0 18px',whiteSpace:'nowrap'}}>
          {TABS_DEF.map(tb=><button key={tb.id} onClick={()=>setTab(tb.id)} style={{padding:'12px 14px',background:'none',border:'none',borderBottom:tab===tb.id?'3px solid #7C3AED':'3px solid transparent',color:tab===tb.id?'#7C3AED':'#6B7280',fontWeight:tab===tb.id?700:400,cursor:'pointer',fontSize:13,fontFamily:'inherit',transition:'all 0.15s',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}><span style={{fontSize:14}}>{tb.icon}</span>{t(`tabs.${tb.id}`,lang)}</button>)}
        </div>
      </div>
      {/* Content */}
      <div style={{maxWidth:1000,margin:'0 auto',padding:'22px 18px 48px'}}>
        {tab==='overview'&&<OverviewTab K={K} fmt={fmt} lang={lang}/>}
        {tab==='predictions'&&<PredictionsTab K={K} lang={lang}/>}
        {tab==='charts'&&<ChartsTab K={K} fmt={fmt} setFmt={setFmt} lang={lang}/>}
        {tab==='planets'&&<PlanetsTab K={K} lang={lang}/>}
        {tab==='dasha'&&<DashaTab K={K} lang={lang}/>}
        {tab==='yoga'&&<YogaTab K={K} lang={lang}/>}
        {tab==='shadbala'&&<ShadbalaTab K={K} lang={lang}/>}
        {tab==='avarga'&&<AshtakavargaTab K={K} lang={lang}/>}
        {tab==='reading'&&<ExpertReadingTab K={K} lang={lang}/>}
      </div>
      <footer className="no-print" style={{textAlign:'center',padding:'16px 20px',borderTop:'1px solid #E5D5C0',background:'white'}}>
        <p style={{margin:0,fontSize:11,color:'#9CA3AF'}}>{t('footer',lang)}</p>
      </footer>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════════
function App(){
  const[screen,setScreen]=React.useState('input');
  const[kundali,setKundali]=React.useState(null);
  const[lang,setLang]=React.useState(()=>localStorage.getItem('jd_lang')||'en');
  const[err,setErr]=React.useState(null);

  React.useEffect(()=>{
    const p=new URLSearchParams(location.search);
    const k=p.get('k');
    if(k){try{const d=JSON.parse(decodeURIComponent(atob(k)));handleSubmit({year:d.y,month:d.mo,day:d.d,hour:d.h,minute:d.mi,utcOffset:d.ut,lat:d.la,lng:d.ln,city:d.ci,country:d.co,timezone:d.tz,gender:d.ge,dob:`${d.y}-${String(d.mo).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`,tob:`${String(d.h).padStart(2,'0')}:${String(d.mi).padStart(2,'0')}`})}catch(e){console.warn('Invalid share link')}}
  },[]);

  function handleSubmit(inp){
    try{setErr(null);setKundali(computeKundali(inp));setScreen('results')}
    catch(e){console.error(e);setErr(t('computeError',lang))}
  }
  function handleLang(c){setLang(c);localStorage.setItem('jd_lang',c)}
  function handleBack(){setScreen('input');history.replaceState({},'',location.pathname)}

  if(err)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#FFF7ED',fontFamily:'serif'}}><div style={{background:'white',borderRadius:12,padding:28,maxWidth:400,border:'1px solid #FDE68A',textAlign:'center'}}><p style={{fontSize:32,margin:'0 0 10px'}}>⚠️</p><p style={{color:'#92400E',fontSize:14,marginBottom:14}}>{err}</p><button onClick={()=>setErr(null)} style={{padding:'9px 22px',borderRadius:8,border:'none',background:'#7C3AED',color:'white',cursor:'pointer',fontFamily:'inherit',fontSize:14}}>{t('tryAgain',lang)}</button></div></div>;
  if(screen==='results'&&kundali)return<ResultsPage K={kundali} onBack={handleBack} lang={lang} setLang={handleLang}/>;
  return<InputForm onSubmit={handleSubmit} lang={lang} setLang={handleLang}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
