name: Playwright Tests
on:
  push:
    branches: [ main, preview ]
  pull_request:
    branches: [ main, preview ]
jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Build Application
      run: npm run build
      
    - name: Ensure Local Server Starts & Run Astrological Accuracy Tests
      # This step starts the node server (or vercel dev) in bg, testing exact math payloads
      # The tests check coordinates vs output json exactly.
      run: |
        npm run test:accuracy
        npm run test:muhurat
        
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 10
